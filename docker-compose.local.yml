services:
  web:
    build: .
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.local
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"        # expose directly — no Traefik in local dev
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./app/static:/app/static:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
