services:
  web:
    build: .
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./app/static:/app/static:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - internal
      - traefik          # joins the external Traefik network
    labels:
      - "traefik.enable=true"
      # ── Router ──────────────────────────────────────────────────────
      - "traefik.http.routers.songguesser.rule=Host(`${APP_HOSTNAME}`)"
      - "traefik.http.routers.songguesser.entrypoints=websecure"
      - "traefik.http.routers.songguesser.tls=true"
      - "traefik.http.routers.songguesser.tls.certresolver=letsencrypt"
      # ── HTTP → HTTPS redirect (uses Traefik's global redirect) ──────
      - "traefik.http.routers.songguesser-http.rule=Host(`${APP_HOSTNAME}`)"
      - "traefik.http.routers.songguesser-http.entrypoints=web"
      - "traefik.http.routers.songguesser-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # ── Service ─────────────────────────────────────────────────────
      - "traefik.http.services.songguesser.loadbalancer.server.port=80"
      # Tell Traefik which network to use when reaching this container
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

networks:
  internal:
    driver: bridge
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
